services:
 app:
  build: .
  env_file:
   - .env.docker
  ports:
  - "3000:3000"
  volumes:
   - .:/app
   - /app/node_modules

 db:
  image: postgres:17
  env_file:
   - .env.docker
  volumes:
   - postgres_data:/var/lib/postgresql/data
   

 redis: 
  image: redis:8

 lgtm:
  image: grafana/otel-lgtm
  container_name: lgtm
  ports:
    - "3001:3000" # Grafana UI
    - "4317:4317" # OTLP gRPC
    - "4318:4318" # OTLP HTTP 
volumes:
 postgres_data:

